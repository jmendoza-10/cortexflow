name: CI

# NOTE: The `build-and-test` job below is duplicated by
# `.github/workflows/release.yml` so the same matrix runs against a
# tagged commit. If you change one matrix, change the other to match.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  diagrams-drift-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate diagrams from C++ source
        run: python3 scripts/gen-diagrams.py examples/minimal_app/app.hpp

      - name: Check docs/diagrams/ is in sync with source
        run: |
          if ! git diff --exit-code docs/diagrams/; then
            echo ""
            echo "::error::docs/diagrams/ is out of sync with the C++ source."
            echo "Regenerate locally and commit the result:"
            echo "  python3 scripts/gen-diagrams.py examples/minimal_app/app.hpp"
            echo "  git add docs/diagrams/ && git commit"
            exit 1
          fi

  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
        target: [host, posix]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure (${{ matrix.target }})
        run: >
          cmake -B build
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}
          -DCORTEXFLOW_BUILD_TESTS=ON
          -DCORTEXFLOW_TRACE_LEVEL=FULL
          -DCORTEXFLOW_TARGET=${{ matrix.target }}

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure
